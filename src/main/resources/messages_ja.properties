tooltip.survey.reportHtml=現在の内容からHTMLレポートを生成します。
tooltip.survey.reportPdf=現在の内容からPDFレポートを生成します。
tooltip.survey.canvas=計測モードON時にクリックで測定点を追加します。マーカー位置は読み込み画像に対する正規化座標で保存されます。
tooltip.survey.coverageHoleToggle=補間RSSIが右のしきい値を下回るエリアに斜線を重ねて表示します。
tooltip.survey.coverageThreshold=カバレッジホールと判定するRSSIしきい値(dBm)です。
tooltip.survey.loadComparison=別プロジェクトの地点データを比較対象(Before)として読み込みます。フロアプラン画像は使用しません。
tooltip.survey.comparisonToggle=読み込み済みの比較対象との差分ヒートマップ(改善=緑 / 悪化=赤)を表示します。

tooltip.security.summary=検出AP総数と高リスク(Open/WEP)件数のサマリです。
tooltip.security.table=暗号方式解析結果の一覧です。右クリックで信頼済み登録/解除もできます。

tooltip.channelPlanning.bandSelector=チャネル設計の対象帯域を切り替えます。
tooltip.channelPlanning.chart=各山はAPごとの混雑度寄与を表します。山にカーソルを合わせると内訳を表示します。
tooltip.channelPlanning.hoverPanel=ホバー中チャネルに対するAP別スコア寄与の内訳です。
tooltip.channelPlanning.recommendation=現在帯域の推奨チャネル(混雑度が低い候補)です。

tooltip.alerts.settings=アラート条件・通知・信頼済みAP・言語設定を開きます。
tooltip.alerts.table=発火したアラートを新しい順に表示します。

tooltip.history.range=検索対象期間を選びます。
tooltip.history.bssidFilter=特定BSSIDのみで絞り込むか、全BSSIDで検索するかを選びます。
tooltip.history.search=現在の条件で長期ログを検索します。
tooltip.history.refreshBssid=DBからBSSID一覧を再取得します。
tooltip.history.exportCsv=現在テーブルに表示中の行をCSV出力します。
tooltip.history.status=検索結果件数や切り詰め状態を表示します。
tooltip.history.chart=選択したBSSIDのRSSI推移を重ね描画します。
tooltip.history.resetYAxis=Y軸ズームを初期範囲に戻します。
tooltip.history.checklist=グラフへ重ね表示したいBSSIDをチェックで選択します。
tooltip.history.table=検索結果の生ログ一覧です。
tooltip.history.fromDate=カスタム範囲の開始日です。
tooltip.history.toDate=カスタム範囲の終了日です。
tooltip.history.fromTime=カスタム範囲の開始時刻(HH:mm、ローカル時刻)です。
tooltip.history.toTime=カスタム範囲の終了時刻(HH:mm、ローカル時刻)です。
tooltip.history.exportAllCsv=現在の期間・BSSID絞り込みに一致する全行を、件数上限なしでCSV出力します(件数が多いと時間がかかる場合があります)。

tooltip.traceroute.host=監視対象ホスト名またはIPを入力します。
tooltip.traceroute.startStop=開始で経路探索+継続監視を開始、停止で監視を止めます。
tooltip.traceroute.status=経路探索状況や監視状態を表示します。
tooltip.traceroute.chart=各ホップのRTT推移(直近5分)を重ね表示します。
tooltip.traceroute.table=ホップごとの現在RTT・統計・損失率を表示します。

tooltip.settings.rssiThreshold=この値未満のRSSIを検知したとき警告を出します。
tooltip.settings.congestionThreshold=チャネル混雑度スコアがこの値以上で警告します。
tooltip.settings.rssiAlert=RSSIしきい値アラートの有効/無効を切り替えます。
tooltip.settings.rogueAp=信頼済みSSIDに対し未登録BSSIDを検知した際のアラートです。
tooltip.settings.newSsid=新しいSSIDを見つけたときの通知を切り替えます。
tooltip.settings.congestionAlert=混雑チャネル検知アラートを切り替えます。
tooltip.settings.notifications=Windows通知(トースト)の表示ON/OFFです。
tooltip.settings.pingHost=Site Surveyで使う既定Ping先です。
tooltip.settings.language=表示言語を切り替えます(再起動後に反映)。
tooltip.settings.trustedList=信頼済みAP(SSID/BSSID)の一覧です。
tooltip.settings.untrust=選択した信頼済みAPを一覧から解除します。
tooltip.settings.save=設定内容を保存して反映します。
